name: Build Hermes Reverser

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Prepare APK
        if: success()
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/HermesReverser.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: HermesReverser-APK
          path: release/*.apk
          retention-days: 90

      - name: Generate Release Tag
        if: success()
        id: tag
        run: |
          TAG="v1.0.0-$(date +%Y%m%d-%H%M%S)-r${GITHUB_RUN_ID}"
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Hermes Reverser v1.0.0 Build ${{ github.run_number }}"
          body: |
            ## Hermes Reverser — Full Release (Build ${{ github.run_number }})

            ### Built-in Analyzers (App Native)
            - **IDA Pro Mobile** — ARM/x86 disassembly, function detection, hex viewer
            - **Capstone Native** — JNI disassembly engine
            - **Strings Extractor** — Native string extraction

            ### Termux Integration (Existing Termux Required)
            - **Radare2** — Full reverse engineering framework
            - **Ghidra Headless** — NSA SRE auto-analysis
            - **Ghidra FOX** — Automated analysis scripts
            - **JADX** — DEX to Java decompiler
            - **APKTool** — APK resource decoder
            - **Unidbg** — Unicorn emulator

            ### Advanced Analyzers
            - **eDBG** — eBPF-based Android debugger (ShinoLeah)
            - **BPFroid** — Android API/native tracer (yanivagman)
            - **heresy** — React Native inspector (Pilfer)
            - **IDAObjcTypes** — Objective-C types collection (PoomSmart)
            - **Frida** — Dynamic instrumentation
            - **JNI Trace** — JNI API tracer
            - **YARA** — Pattern matcher

            ### AI Parallel Analysis (8 Platforms)
            - OpenAI GPT-4, Kimi, Qwen, Gemini, Claude, DeepSeek, Ollama, SuperNinja

            ### Features
            - **Termux IDA+MCP Auto-Setup** — Debian install + MCP server + tools
            - **AI Chat** — OpenClaw-style multi-platform chat
            - **Reinforcement Learning** — Auto platform ranking optimization
            - **MANAGE_EXTERNAL_STORAGE** — Full file system access on Android 11+

            ### Installation
            1. Download `HermesReverser.apk` below
            2. Enable "Install unknown apps" in Settings
            3. Grant "All files access" permission on first launch
            4. Enter API keys in Settings for AI platforms
            5. Install Termux from F-Droid for advanced analysis tools

            ### Permissions
            - `MANAGE_EXTERNAL_STORAGE` — Access all files
            - `INTERNET` — AI API calls
            - `FOREGROUND_SERVICE` — Background analysis
          files: release/*.apk
          make_latest: true

      - name: Show APK info
        if: success()
        run: ls -lh release/*.apk && sha256sum release/*.apk
